<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>
    <header>
        <h1 id="title">Restaurant Survey Form</h1>
        <p id="description">We value your feedback! Please take a few minutes to complete this survey and let us know about your dining experience at our restaurant. Your responses will help us improve our service and meet your expectations. Thank you for your time!</p>
    </header>
    <form id="survey-form" action="">
    <fieldset>
        <legend>Customer info</legend>
        <label id="name-label" for="name">Name: </label>
        <input type="text" id="name" name="customer-name" placeholder="Sarah Johnson" required>
        <label id="email-label" for="email">Email: </label>
        <input type="email" id="email" name="customer-email" placeholder="example@example.com" required>
        <label id="number-label" for="number">Age: </label>
        <input type="number" id="number" name="customer-age" placeholder="25" min="3" max="120" required>
    </fieldset>
    </form>
</body>
</html>
