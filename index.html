<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>
    <header>
        <h1 id="main-heading" title="This is the main heading of the page">Restaurant Survey Form</h1>
        <p id="main-description">We value your feedback! Please take a few minutes to complete this survey and let us know about your dining experience at our restaurant. Your responses will help us improve our service and meet your expectations. Thank you for your time!</p>
    </header>
    <form id="survey-form" action=""></form>
    <fieldset>
        <legend>Customer info</legend>
        <label for="name-label">Name: </label>
        <input type="text" id="name-label" name="customer-name" placeholder="Sarah Johnson">
    </fieldset>
</body>
</html>
