<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>
    <header>
        <h1 id="title">Restaurant Survey Form</h1>
        <p id="description">We value your feedback! Please take a few minutes to complete this survey and let us know about your dining experience at our restaurant. Your responses will help us improve our service and meet your expectations. Thank you for your time!</p>
    </header>
    <form id="survey-form" action="">
    <fieldset>
        <legend>Customer info</legend>
        <label id="name-label" for="name">Name: </label>
        <input type="text" id="name" name="customer-name" placeholder="Sarah Johnson" required>
        <label id="email-label" for="email">Email: </label>
        <input type="email" id="email" name="customer-email" placeholder="example@example.com" required>
        <label id="number-label" for="number">Age: </label>
        <input type="number" id="number" name="customer-age" placeholder="25" min="3" max="120" required>
    </fieldset>
    <p>
        <label for="nationality">What nationality's cuisine do you choose?</label><br>
    <select id="dropdown">
        <option value="thai-food">Thai</option>
        <option value="italian-food">Italian</option>
        <option value="mexican-food">Mexican</option>
        </select>
    </p>
    <p>
        <label for="visit-frequency">How often do you visit our restaurant?</label><br>
    <select id="visit-frequency">
        <option value="every-day">Every day</option>
        <option value="twice-and-three">Twice or three times a week</option>
        <option value="weekly">Weekly</option>
        <option value="rarely">Rarely</option>
    </select>
    </p>
    <p>
        <label for="comeback-again">Would you consider returning to dine at our restaurant?</label><br>
        <input type="radio" id="yes" name="comeback" value="yes">
        <label for="yes">Yes</label>
        <input type="radio" id="no" name="comeback" value="no">
        <label for="no">No</label>
    </p>
    
    <fieldset>
        <legend>Food Quality</legend>
        <label for="food-fresh">Food is always fresh: </label>
        <input type="radio" id="excellent" name="rating" value="excellent">
        <label for="excellent">Excellent</label>
        <input type="radio" id="good" name="rating" value="good">
        <label for="good">Good</label>
        <input type="radio" id="average" name="rating" value="average">
        <label for="average">Average</label>
        <input type="radio" id="poor" name="rating" value="poor">
        <label for="poor">Poor</label>


        <label for="menu"></label>
    </fieldset>

    </form>
</body>
</html>
